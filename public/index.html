}
@keyframes rgbText{
0%{background-position:0%}
100%{background-position:400%}
}

/* LANGUAGE RGB RING */
.lang-container{

justify-content:center;
gap:30px;
margin-top:70px; /* আগে 30px ছিল → এখন বেশি */

.lang{
position:relative;
width:100px;
height:100px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
overflow:hidden;
}
.lang::before{
content:"";
position:absolute;
width:140%;
height:140%;
background:conic-gradient(red,orange,yellow,green,cyan,blue,violet,red);
animation:spin 4s linear infinite;
}
.lang::after{
content:"";
position:absolute;
inset:6px;
background:#020617;
border-radius:50%;
}
.lang img{
position:relative;
width:45px;
z-index:2;
}
@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

/* BLUR IMAGE SECTION */
.blur-img{
width:320px;
max-width:90%;
border-radius:14px;
filter:blur(8px);
transition:.5s;
cursor:pointer;
}
.blur-img.active{

<!-- ❄ Snow Effect Start -->
<style>
.snowflake {
  position: fixed;
  top: -10px;
  color: white;
  font-size: 18px;
  pointer-events: none;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}
</style>

<script>
function createSnow() {
  const snow = document.createElement("div");
  snow.classList.add("snowflake");
  snow.innerHTML = "❄";
  
  snow.style.left = Math.random() * window.innerWidth + "px";
  snow.style.animationDuration = (3 + Math.random() * 5) + "s";
  snow.style.opacity = Math.random();

  document.body.appendChild(snow);

  setTimeout(() => snow.remove(), 8000);
}

setInterval(createSnow, 200);
</script>
